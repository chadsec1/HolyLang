name: Unit Tests

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  
  pull_request:
    branches: [ "main" ]


jobs:
  unit_tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Run unit tests
        run: cargo test --all --verbose



