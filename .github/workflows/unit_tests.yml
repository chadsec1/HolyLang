name: Unit Tests

permissions:
  contents: read
  issues: read
  pull-requests: read

on:
  push:
    branches: [ "main" ]
  
  pull_request:
    branches: [ "main" ]


jobs:
  unit_tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
      
      - name: Run unit tests
        run: cargo test --all --verbose



